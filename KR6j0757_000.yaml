body:
  text: 纂要序閲大藏作陀羅尼法須得五智灌頂紹阿闍黎位方可傳授若不爾者自招殃咎此世尊授阿難之密囑耳相傳既久法臣成弊後蓮大師去華就實稽古考定時流奇好痛口訶責今觀巨徹上座之纂要深得先哲之訓以正季世之訛可謂洞開古詻枝蔓剪除功補緇門饒益有情者也歲在乙卯重陽前五日桃無隱千峰立書瑜伽𦦨口儀軌六則苕水子若觀內衡銓同考正瑜伽密教釋迦説法有顯有密顯通大小密唯大乘瑜伽本經都十萬偈有十八會除十八會餘經屬顯今大藏中佛説救拔𦦨口餓鬼陀羅尼經是不空譯佛説救面然餓鬼陀羅尼神呪經實叉難陀譯一經二譯俱唯有變食真言此經自屬顯教不空又譯出瑜伽集要救阿難陀羅尼𦦨口儀軌經復用密部大悲空智儀軌經云瑜伽即相應義謂一切乘境行果所有諸法皆相應也其密教相如顯密圓通中説施食緣起如本經説壇儀一切如來真實攝經説大曼茶囉有五部初佛部毗盧遮那佛為部主次金剛部阿閦佛為部主次寶部寶生佛為部主次蓮華部阿彌陀佛為部主次羯磨部不空成就佛為部主又五部各有四大品一金剛界二降三世三遍調伏四一切義成就又四品中各建立六曼茶囉所謂大曼茶囉三昧耶曼茶囉法曼茶囉羯磨曼茶囉四印曼茶囉一印曼茶囉今本壇儀于五部中屬蓮華部于四大品遍是調伏千手千眼觀自在菩薩念誦儀軌明四種壇法所謂息災增益敬愛降伏今是增益出世悉地梵語曼茶囉或云曼荼囉等有翻即壇義準千手眼儀軌中結才發意轉法輪菩薩印云以印置身前空中即滿虗空界成大曼茶囉以印安于心上即自身成大曼茶囉等則知曼茶囉非止是壇義後當再明而本經儀軌名三昧耶壇者即與弟子及鬼神授戒壇也般若理趣釋中梵語三昧耶含四義第四義云三昧耶亦為曼茶囉之異名故六曼茶囉中第二名三昧耶曼茶囉其名義一也金剛頂瑜伽略出念誦法有畫像壇手印壇此用手印壇也手印壇亦名隨心壇隨心變現故千手眼觀自在菩薩十肘曼茶囉法門云以曾入大會三曼拏囉金剛大道場者不須作曼拏囉唯結印誦呪無願不果大毗盧遮那成佛神變經本尊三昧品云諸尊有三種身所謂字印形相其畫像法必須作曼拏囉如法故藏本集施食儀人慮末世不能建畫像曼拏囉亦恐不得金剛阿闍黎故權用大輪明王呪印與轉法輪呪印起首深為有理宜可準行又曼拏疏云夫為道者析運為宗上若不供諸佛菩薩何處展智欲求菩提下若不濟諸仙餓鬼何處行悲以度薩埵有信之流無遺斯業今本印現壇儀以前是上供求菩提啓告以後是下濟度薩埵阿闍黎國師金剛智乃西域人親傳龍智阿闍黎法唐開元七年來支那所至結壇作灌頂道場即此土阿闍黎之始祖也準瑜伽大教王經乃是十地灌頂位菩薩其次或是解行地菩薩故最上大乘金剛大教寶王經稱為金剛阿闍黎𦦨口儀軌經云若樂修行者應從瑜伽阿闍黎學發無上大菩提心受三昧耶戒入大曼拏囉得灌頂者然許受之受大毗盧遮那如來五智灌頂紹阿闍黎位方可傳教也若不爾者遞相不許設爾修行自招殃咎成盜法罪終無功效佛説持明藏儀軌經云行人若欲修習諸成就法者先須修習觀智及諸印相皆令精熟毋使謬誤于作法時若稍疑誤不成印契即賢聖不喜凡所祈求不獲成就觀菩提心守護國界主陀羅尼經云謂觀此身體成金剛堅固不壞當以身作金剛結跏以堅牢智諦觀自心以為月輪當于鼻端不令馳散清淨圓滿色如凝雪牛乳水精而此月輪為菩提心此菩提心本無色相為未成就諸衆生故説如月輪妙法蓮華經王儀軌云推求自心乃至不可得則能悟入人空智法空智即于此無所得心觀于圓明淨無塵翳如秋滿月炳現于身仰于心王則此是本源清淨大圓鏡智佛説瑜伽大教王經觀想菩提心大智品佛言此菩提心即是身相身相性空即真菩提身既無別語相亦然毗盧遮那儀軌云先證一道清淨次證菩提心菩提心釋云菩提心離一切性非五蘊乃至自既覺悟菩提心如實觀己然後發大悲心令諸衆生于自心法如實證覺如是名為一切根本最上菩提心字種阿闍黎觀想三十七尊字種具如佛説瑜伽大教王經佛説一切如來真實攝現證三昧經調伏一切世間大曼拏囉儀軌云爾時大毗遮那如來即入一切如來金剛法三昧出生加持蓮花三摩地説此一切如來法三昧即一切如來心從自心出説是心明曰𠶹哩説是心明時從一切如來心出現蓮花相有無數色殊妙光明其光旋復從聖觀自在菩薩摩訶薩心入𠶹哩字具四字義成一字真言如密呪圓因集説十八會指歸云于月輪上有旋列真言字住心于一一字實相理相應用而復始手印準金剛頂略出念誦法右手配止左手配觀十指配度右手施戒忍進禪左手慧方願力智蓋西域當陽向東以右尊左卑故也如意輪蓮華心儀軌亦同瑜伽大教王經云爾時大遍照如來即釋迦佛變相告金剛手菩薩言三金剛大智所生祕密印相法若持誦者依法結印能滅一切罪業復能觀想真理即得證于無上菩提何況別求成就之事乃至依此菩提心想為月輪於月輪上想有唵字為身金剛次想阿字成語金剛吽字成心金剛故凡結印先當想此三梵書字今手印圖上皆有唵阿吽三梵書者即是用經義也又云一切印從金剛掌金剛拳金剛縛生起時康熙十四年歲在乙卯孟秋自恣前三日淨業比丘寂暹巨徹氏熏沐敬書於楞嚴般若堂瑜伽𦦨口儀軌終夫欲遍供普濟者虔懇至誠嚴潔壇場隨力備辦香花供養飲食淨水等已準戌亥二時施之餓鬼得食施主獲福如過其時徒廢精神於事無益斯出本教亦非胸見今有違者地方不寧即此過也若欲深明所以請觀後注文備彰矣
