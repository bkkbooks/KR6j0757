皆回向普願沉溺諸衆生速往無量光佛剎會上因緣三世佛文殊普賢觀自在諸尊菩薩摩訶薩摩訶般若波羅蜜歸依三寶上來設放瑜伽𦦨口平等甘露法食功德圓滿無限良因普沾沙界和南聖衆嘉興楞嚴寺般若堂經資刻此瑜伽注集纂要二卷計字萬千百十該銀拾兩錢康熙十四年七月比丘寂暹識附增津濟疏一泗天下南贍部洲大清國浙江等處承宣布政使司某府某縣僧綱司某寺幻住秉釋迦如來遺教主修焰口法事比丘某今據某府某縣某鄉貫居住奉佛普利薦扷賑濟孤魂信某是夜沐手焚香一心拜于本師和尚釋迦文佛接引導師彌陀慈父瑜伽會上寶勝如來幽冥教主地藏菩薩廣度羣迷觀音大士興權啓教難陀尊者一陰真宰郡邑城隍土穀靈聰當方司令惟願同垂慧鑑俯察葵裏情旨伏為切念冥途杳隔泉界難通不憑修薦之功曷遂超升之理由是發心取今年月日延命僧伽啓建某道場一會是夜敦請金剛上師登壇設放瑜伽焰口平等甘露法食超法界之孤魂濟河沙之含識伏以九幽十類未脫生死之輪八難三塗寧免饑虗之苦今則無遮會啓觀音現焦面之形大施門開尊者設摩伽之斛請七如來而作證慈化流芳結三昧印以加持悲增護念化粒米為大地超沉冥于萬靈德澤四生恩霑九有所集功德專伸修薦某仗此良因早登覺岸所冀五衰不現天宮脫牛領之因四相皆空人世樂堯風之化修羅罷戰從茲捨盡嗔心地獄停酸自此高躋淨域受甘露味多生饑火以全消證金剛智纍劫愚癡而頓釋伏願胎卵濕化各各悟本性之彌陀鱗甲羽毛彼彼達惟心之淨土獲無生忍入不退地者恭于三寶證明賑濟孤魂文疏歲在康熙年月日具附六道疏式五衰不現天仙道衆四相皆空人倫道衆乙卯孟秋捨盡嗔心修羅道衆僧自恣日息諸苦惱地獄道衆淨業比丘常獲飽滿餓鬼道衆寂暹謹識速得智慧畜生道衆跋余髫年時側聆先師祖垂訓曰既得出俗為僧當發大弘誓願凡利生接物之陰功惟𦦨口一事為最大因二六銘心隨取瑜伽密部澄神而習繹之不輟晝夜者今將二十年矣蓋閲諸家登壇演習繁簡不同為有七家𦦨口八家懺之訛傳致令好新奇杜撰之端因茲始矣所以參差百等諸方不能一揆也故今繁簡得中悉遵天機大師行并纂內法師所集本部注文合成一帙名注集纂要呈鑑諸方高賢達士若以為可願廣流通大地若以為不可乞垂慈誨片言博笑大方合十云耳時丙辰秋日法雲後學寂暹跋并書
