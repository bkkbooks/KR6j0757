二屈指上有白色𠶹哩二合字入彼鬼身如日爍露之狀罪垢銷鎔猶如墨汁從足流下滲入地中至金剛際問前來既召既摧既破今復為懺悔何耶答前來並是理懺悔今者方是事懺悔理事無礙故不濫也又問何罪如墨汁答罪者黑業也故以黑表汁有流注之義故云如墨汁者也諸佛子等既懺悔已百劫積集罪一念頓消除如火焚枯草滅盡無有餘一滴清凉水能除饑渴痟彈灑灌頂門悉令獲安樂次結妙色身如來施甘露印或云施清凉印即以右羽轉腕向前進禪度相彈施甘露真言那謨蘇嚕耶答塔葛達耶怛牒塔唵酥嚕酥嚕鉢囉二合酥嚕鉢囉二合酥嚕莎訶師印呪可知結印誦呪想左手願上有一白色鑁字流出甘露如水銀色是真智所成右手點取彈灑虛空想諸天及人鬼等類觸此甘露悉具色相猛火悉滅普得清凉離饑渴想滅心執障汝等自從無量劫造諸惡業起慳貪由此業力閉咽喉仗此密言悉開通次結開咽喉印儀軌經云左羽想持蓮花右羽忍禪彈作聲隨誦而彈之開咽喉真言曰唵那謨葛咓諦月補辣葛得囉二合耶答塔葛達耶師印呪可知結印誦呪左手掌中想一青色蓮花蓮花上想一白色阿字流出性水極甚清冷右手點取彈灑虛空想諸鬼衆得觸此水咽喉廣大清涼潤澤無所障礙問何前來多用𠶹哩二合字此獨用字何也答阿字是語種故依三本而續用之也此廣博身如來開咽喉印依唧怛哩法師說師是加行位菩薩知之自身想觀自在菩薩心月輪上想白色𠶹哩二合字出光照前鬼神等手結施清凉印口誦心密言并忍禪開左手蓮花時想鬼神等咽喉自開通達無礙便得出聲接得名號隨聞記云右手禪度上想一月輪輪上想一白色阿字流出般若甘露法水以忍禪彈時左手蓮花開拆甘露滿中想諸鬼神咽喉開通清凉潤澤無所障礙語諸佛子今為汝等作印呪已咽喉自開通達無礙離諸障難諸佛子等我今為汝稱讚如來吉祥名號能令汝等永離三途八難之苦常為如來真淨佛子南無寶勝如來二羽金剛掌六度內相義進力頭相拄禪二羽金剛掌六度內相義進力頭相拄禪智側竪立稱贊七佛由二益故一則總能滅除諸業報障二乃莊嚴役等令成法器那謨囉怛納二合怛囉耶答塔葛達耶誦彼如來結彼手印應不離自身觀音也諸佛子等若聞寶勝如來名號能令汝等塵勞業火悉皆消滅南無離怖畏如來右羽胸前竪忍禪智相捻掌覆指下垂左掌仰上舒那謨微葛怛得囉二合納耶答塔葛達耶諸佛子等若聞離怖畏如來名號能令汝等常得安樂永離驚怖清淨快樂南無廣博身如來那謨葛咓諦月補辣葛得囉二合耶答塔葛達耶諸佛子等若聞廣博身如來名號能令汝等餓鬼針咽業火停燒清凉通達所受飲食得甘露味南無妙色身如來那謨蘇嚕叭耶答塔葛達耶諸佛子等若聞妙色身如來名號能令汝等不受醜陋諸根具足相好圓滿殊勝端嚴天上人間最為第一南無多寶如來二羽虛合掌胸前蓮花狀那謨波虎囉怛納二合耶答塔葛達耶諸佛子等若聞多寶如來名號能令汝等具足財寶稱意所須受用無盡南無阿彌陀如來以右壓左禪智相拄那謨阿彌哆婆耶答塔葛達耶諸佛子等若聞阿彌陀如來名號能令汝等往生西方極樂淨土蓮花化生入不退地南無世間廣大威德自在光明如來那謨盧迦委斯的二合呤捺二合第唧說囉不囉二合耶答塔葛達耶右羽曲仰拳忍禪度相彈左掌仰上五指皆舒諸佛子等若聞世間廣大威德自在光明如來名號能令汝等獲得五種功德一者于諸世間最為第一二者得菩薩身端嚴殊勝三者威德廣大超過一切外道天魔如日照世顯于大海功德巍巍四者得大自在所向如意似鳥飛空而無阻礙五者得大堅固智慧光明身心明徹如琉璃珠稱贊畢阿闍黎白云諸佛子等此七如來以誓願力拔濟衆生永離煩惱脫三塗苦安隱常樂一稱其名千生離苦證無上道三說次與汝等皈依三寶皈依佛兩足尊皈依法離欲尊皈依僧衆中尊皈依佛不墮地獄皈依法不墮餓鬼皈依僧不墮傍生汝等佛子皈依佛竟皈依法竟皈依僧竟以上俱阿闍黎三說表白三和皈依三寶故如法堅護持自離邪見道是故至心禮次結三寶印左羽作拳相竪進度當胸右手屈力度心想誦真言唵婆重呼龕南無佛南無法南無僧我今發心不為自求人天福報聲聞緣覺乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提今所發覺心遠離諸性相蘊處及界等能取所取執諸法悉無我平等如虗空自心本不生空性圓寂故如諸佛菩薩發大菩提心我亦如是發是故至心禮次與汝等發菩提心汝等諦聽阿闍黎鳴尺一下白四弘誓願衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成假使熱鐵輪於汝頂上旋終不為此苦退失菩提心次結發菩提心印二羽虛合如蓮花狀以印心上唵補提即答沒怛巴達野彌師印呪可知應想心佛衆生三無差別于一念間融成一廣大月輪如八月十五日夜中宵無雲之時極甚清凉皎潔與虛空齊等于月輪中想一金色阿字如秋毫之末非有非無故當爾之時不得加了于知上無佛可成下無生可度中無行可修煩惱菩提生死涅槃淨盡此為大要宜善用心焉不惟為鬼神作利益行人不久亦即就此中了解者矣師誦呪衆和三聲次白云今為汝等發菩提心竟諸佛子等當知菩提心者從大悲起成佛正因智慧根本能破無明煩惱惡業不被染壞次與汝等受三昧耶戒行者鳴尺一下白云一攝律儀戒無惡不斷起正道行是斷德因修成法身二攝善法戒無善不積起助道行是智德因修成報身三攝衆生戒無生不度起不住道是恩德因修成化身既成大器堪受寶戒三昧耶者準大樂金剛三昧經云三昧名為本誓亦名時亦名期契亦名曼茶羅乃異名也故有四種一大二三昧耶三法四羯磨曼茶羅者此四總攝一切曼茶羅又三昧耶亦四智印即大智印三昧耶智印法智印羯磨智印又神變義釋云三昧耶者是平等義是本誓義是除障義是驚覺義言平等者謂如來現證此三昧時一切衆生種種身語意皆悉與如來等禪定智慧與實相身亦畢竟等初發心時與地波羅蜜滿時亦畢竟等是故出誠諦言以告衆生若我所言必定不虗者亦合一切衆生發此忱諦之言時亦蒙三蜜加持無盡莊嚴與如來等以是因緣故能作金剛事業故名三昧耶也言本誓者如來現證此三昧時見一切衆生悉有成佛義故即將立大誓願我今要從普門以無量方便合一切衆生皆至無上菩提劑衆生界未盡以來我之事業終不休息若有衆生隨我本誓發此忱實言時亦令彼所為事業皆悉成金剛性故名三昧耶也言除障者如來見一切衆生悉有如來法界但有一念無明故常在其前而不覺知是故發誠實言我今要當設種種方便普為一切衆生抉除眼膜若我誓願必當成就者令諸衆生隨我方便說此忱實言時乃至于一切衆生獲無垢眼障蓋都盡故名三昧耶也言驚覺義者如來以一切衆生皆在無明睡故于如是功德不自覺知故以議言感動令得醒悟亦以此驚覺諸菩薩等令發起禪定窟學師子頻申三昧若真言行人說此三昧耶者我等諸佛亦當憶持本誓不得違越猶如國王自制法已遂自敬順行之故名三昧耶也具如是等廣大甚深微妙之義故名三昧耶也汝等受佛戒即入諸佛位位同大覺已真是諸佛子次結三昧耶印二羽金剛縛忍願申如針誦真言曰唵三摩耶薩埵鑁師印呪可知應想印中有白色鑁字放大光明普照所請一切有情彼諸有情蒙光照及三世諸佛戒波羅蜜一時圓滿法界善法想為光明流光灌頂貯彼身中身同普賢坐大月輪紹諸佛職為佛嫡子也據本文義無別觀想但如印呪自成受懺如金剛頂經說若誦此呪一遍如入壇輪證三摩提一切善法皆悉滿足三聚淨戒俱時圓滿身同普賢坐大月輪一切諸佛憶昔本誓觀察護念設有人曾受佛戒惡心破毀不復清淨者若誦此呪一七遍已破戒罪垢悉得清淨一切戒品還得如故一切壇法未經師受誦呪七遍即許行作不成盜法今為汝等授三昧耶戒竟從今以去能令汝等入如來位是真佛子從法化生得佛法分汝等冥陽諸有情我今施汝甘露食法力加持遍十方令汝一一皆飽滿次結無量威德自在光明如來印藏本云左印想持器右羽彈忍禪隨聞記云想字有據作如字理甚允當行者思之嚩薩哩斡二合答塔葛達阿咓盧揭諦鑁婆囉鑁婆囉三婆囉三婆囉吽師印呪可知侍者取水點腕中及桶中退坐本位師應以右手怖畏彈指遣左手魔礙念云吽吽癹怛念三遍問手有何魔耶答為手中有諸戶蟲次變空念云唵㰠或三遍問變空此手其意如何答以此手是赤白二種不淨所成故空之令成勝妙功德莊嚴手也問前來入禪定則自己是菩薩今復何故又遣魔變空答法華經云世尊說無量義已又入三昧放光至開寶塔又入定放光豈不濫耶蓋因一事而彰一法譬乎世禮祀宗廟之人非不齊戒沐浴及至登殿之時却又盥手何也為表敬也今再遣魔變空表慈之深悲之極用心之切也次于一念間頓成勝妙之手於手掌中出一紅色𠳐字變成紅色蓮花花上想一白色鑁字明點中流出無盡飲食想面前水器盡成摩竭陀國之斛七寶嚴飾滿盛勝妙食等然後想此字種流出無盡飲食變滿法界念唵阿𠶹哩二合吽呪一百八遍或四十九遍當自知時次念變食呪每一念于明點中想取飲食彈灑虗空準本經云阿難白佛大悲世尊願救我苦所以者何昨夜三更經行靜處念所受法見焰口鬼而語我言汝過三日必當命盡生餓鬼中我問鬼言云何令我得免斯苦餓鬼答言汝若能施百千萬億那由他恆河沙數無量餓鬼婆羅門仙閻羅所司業道冥官及諸鬼神侍從眷屬先亡久遠平等普施餓鬼飲食汝得增壽白言世尊云何能辨無量飲食充足佛告阿難汝今勿怖我念過去無量劫中曾作婆羅門時于觀世音菩薩摩訶薩邊受得陀羅尼名曰無量威德自在光明如來陀羅尼法汝若善能作此陀羅尼法加持七遍能令一食變成種種甘露飲食即能充足百千俱胝那由他恆河沙數一切餓鬼婆羅門仙異類鬼神上妙飲食皆得飽滿如是等衆一一皆得摩伽陀國所用之斛此食此水量同法界食之無盡皆獲聖果解脫苦身佛告阿難汝今受此陀羅尼法令汝福德壽命增長餓鬼生天及生淨土受人天身能令施主轉障消灾延年益壽現招勝福當得菩提云云此呪舊多一鑁字應準本經儀軌除之語諸佛子今為汝等作印呪已變此一食為無量食大如須彌量同法界終無能盡由此真言力變食作乳海普施餓鬼等身心皆飽滿復結前印誦乳海真言那麻三鬘哆勃塔喃鑁師印呪可知應想明點中流出甘露以右手點取彈灑虗空如雨注下凡所至處即成長河酥酪也問何以少小器水等遍滿法界答心力難思故也況又藉神呪及字種觀想等力乃至諸佛冥加禪定之力豈不能變小成大化少為多也且如樂巴一巵之酒以術力尚能化為霖雨何呪神呪難思之力者乎行者亦不可不專注用心也又問何故不以飲食施之却用水也答彼鬼趣多為業火所燒故今以水施之沃滅其業火佛云彼鬼等百千萬劫不聞漿水之名何況得飲又云彼鬼在恆河邊而不見水設使得見變成膿血若飲之時入腹化為猛焰熱燒心腹難堪痛苦悲哉悲哉故今以水施之體此意也又番本云蘇嚕巴此云水施食則知本乎施水矣今世俗不知多用施食水亦失矣況今施食亦不專用水彼器中皆投飯七粒遍十方是也故勿疑諸耳語諸佛子今為汝等作印呪已由此印呪加持威力想于印中流出甘露成於乳海流注法界普濟汝等一切有情充足飽滿汝等業障鬼變火不能食今誦祕密言法食皆飽滿次誦障施鬼真言唵啞吽拶辣彌擔薩哩斡二合不哩二合的毗牙二合莎訶師印呪可知應埀展右羽想右掌中有一鑁字明點中流出甘露從左掌而下念唵啞𠶹哩二合吽字一百八遍或三七遍皆可侍者至師前作禮取淨瓶出壇將淨水徐徐注下師至唱時想彼障施鬼悉皆胡跪師想自身觀音遍至其前而施甘露從頂上入滅其業火而得清涼呪三遍各彈指一下呪三遍或七遍障施鬼等飽滿歡喜彈指一下是時行者即以右羽持甘露器面向東立瀉于壇前或淨地上或于石上或新淨瓦盆亦名盂蘭盆生臺亦得或泉池河海長流水中不得瀉于石榴桃樹之下鬼神懼怕不得食之若聖衆壇中明王諸天若施飲食置生臺上是本法也若供養諸佛聖衆于上五更晨朝日出是供養時若鬼神法于人定亥時本人定時阿闍黎法若於齊時盡于一日但加持飲食水等布施飛空烏獸水族之類不揀時節但用施之若作餓鬼施食之法當于亥時若于齊時施餓鬼食者徒設功勞終無效也不是時節妄生虗誑鬼神不得食也不從師得自招殃咎成盜法罪佛說普賢曼拏羅經云左手彈指一切善事速疾成就右手彈指速疾集會蘇悉地羯羅供養法云兩手各作彈指是辟除法也諸佛子等雖復方以類聚物以羣分然我所施一切無礙無高無下平等普遍不擇冤親汝等今日勿得以貴輕賤以強凌弱擁遏孤幼令不得食使不均平越佛慈濟必須互相愛念猶如父母憶子之想語諸佛子汝等各有父母兄弟姊妹妻子眷屬善友親戚或有事緣來不得者汝等佛子慈心愛念各各賫持飲食錢財物等遞相布施充足飽滿無有乏少令發道意永離三塗長越四流當捨此身速超道果又為汝等將此淨食分為三分一施水族令獲人空二施毛羣令獲法寂三施他方稟識陶形悉令充足獲無生忍神呪加持淨法食普施河沙衆鬼神願皆飽滿捨慳貪速脫幽冥生淨土次結普供養印唵葛葛納三婆斡斡資囉二合斛師印呪可知應想屈中指處想白色唵字明點中流出無盡供養具足莊嚴平等供養同聲念普供養真言或五遍或七遍問最初既奉獻三寶施食已竟今復何故作此供養答前來所作由揀聖凡故奉獻三寶後施鬼衆今融以平等故聖凡交徹所以普供養也維那白從來所受飲食文畢師應作五供養施寶錯念斯麻囉等呪無量壽如來儀軌云次結大虗空菩薩印二手合掌二中指右押左外相叉博著手背二頭指相蹙如寶形即成想從印中流出無量諸供養具衣服飲食等諸佛子等從來所受飲食皆是人間販鬻生命酒脯錢財血肉𦎬羶葷辛臭穢雖復受得如是飲食譬如毒藥損壞於身但增苦木沉淪苦海無解脫時我今依如來教精誠罄捨設此無遮廣大法會汝等今日遇茲勝事戒品沾身于過去世廣事諸佛親近善友供養三寶由此因緣值善知識發菩提心誓願成佛不求餘果先得道者遞相度脫又願汝等晝夜恆常擁護于我滿我所願以此施食所生功德普將回施法界有情共諸有情同將此福盡皆回施無上菩提一切智智勿招餘果願速成佛尊勝呪唵𠽾二合莎訶唵捺謨葛斡諦薩哩斡二合得囉盧迦卜囉二合諦月涉瑟吒二合耶勃塔耶爹捺麻答的牙二合塔唵𠽾二合𠽾二合𠽾二合杓訛二合塔耶杓訛二合塔耶月杓訛二合塔耶月杓訛二合塔耶啞薩麻薩蠻達啞斡薩思葩二合囉拿葛諦葛葛拿莎斡月述提啞撇羶𠽷都𦎌薩哩斡二合答塔葛達蘇葛答瓦囉斡拶拿啞密哩二合達啞撇釋該而二合馬曷木得囉二合曼特囉二合叭啞曷囉啞曷囉馬麻藹由而二合傘塔囉尼杓訛二合塔耶杓訛二合塔耶月杓訛二合塔耶月杓訛二合塔耶葛葛拿娑斡月述提烏失尼沙身拶耶巴哩述鐵薩曷思囉二合囉思彌二合傘租爹敵薩哩斡二合答塔葛達啞斡嚕結尼煞吒二合巴囉密達巴哩卜囉尼薩哩斡二合答塔葛達麻諦答攝蒲密卜囉二合牒瑟吒二合諦薩哩斡二合答塔葛達赫哩二合達耶啞牒瑟吒二合拿啞牒瑟吒二合諦木得哩二合木得哩二合馬曷木得哩二合斡資囉二合葛耶三曷達拿叭哩述鐵薩哩斡二合葛哩麻二合啞斡囉拿月述鐵卜囉牒聶斡而達二合耶馬麻藹由而二合月述提二合薩哩斡二合答塔葛達二合薩麻耶啞牒瑟吒二合拿啞牒瑟吒二合諦唵摩尼摩尼馬曷摩尼月摩尼月摩尼摩曷月摩尼麻諦麻諦馬曷麻諦麻麻諦莎麻諦答塔葛達蒲達戈𨕕巴哩述提月思蒲吒卜鐵述鐵希希拶耶拶耶月拶耶月拶耶思麻二合囉思麻二合囉思葩二合囉思葩二合囉思葩二合囉耶思葩二合囉耶薩哩斡二合勃塔啞牒吒二合拿啞牒瑟吒二合諦述鐵述鐵卜鐵卜鐵斡資哩二合斡資哩二合馬曷斡資哩二合莎斡資哩二合斡資囉二合葛而二合毗拶耶葛而二合毗月拶耶葛而二合毗斡資囉二合左辣葛而二合毗斡資囉二合忒葩微斡資囉二合三葩微斡資囉二合斡資哩尼斡資㘕二合斡都麻麻攝哩㘕薩哩斡二合薩埵喃拶葛耶巴哩述提斡都薩埵彌薩哩斡二合葛諦巴哩述提釋哲二合薩哩斡二合答塔葛達釋哲二合𦎌薩麻刷薩顏都卜鐵卜鐵悉鐵悉鐵勃塔耶勃塔耶月勃塔耶月勃塔耶謨拶耶謨拶耶月謨拶耶月謨拶耶杓訛二合塔耶杓訛二合塔耶月杓訛二合塔耶月杓訛二合塔耶薩蠻答謨拶耶謨拶耶薩蠻答囉思彌二合巴哩述提薩哩斡二合答塔葛達赫哩二合達耶啞牒瑟吒二合拿啞牒瑟吒二合諦木得哩二合木得哩二合馬曷木得哩二合馬曷木得哩二合曼特囉二合叭諦莎訶佛頂尊勝陀羅尼經云此呪能破一切地獄琰魔王界旁生之苦回趨善道此呪不可思議有大神力等舉往生呪三遍此圓滿加持復有二種一神呪圓滿二善根圓滿