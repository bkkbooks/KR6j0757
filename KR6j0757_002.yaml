body:
  text: 苕水法師子若淨觀考正稱山法師內衡智銓較閲秀州後學巨徹寂暹纂書毗盧遮那佛願力周沙界一切國土中恆轉無上輪般若心經一遍藏本中無默念二字念般若心經意具如佛母般若波羅蜜多大明觀想儀軌中明啓告十方一切諸佛般若菩薩金剛天等及諸業道無量聖賢我今某甲以大慈悲乘佛神力召請十方盡虗空界三塗地獄諸惡趣中曠劫饑虗一切餓鬼閻羅諸司天曹地府業道冥官婆羅門仙久遠先亡曠野冥靈虗空諸天及諸眷屬異類鬼神惟願諸佛般若菩薩金剛天等無量聖賢及諸業道願賜威光悲增護念普願十方盡虗空界天曹地府業道冥官無量餓鬼多生父母先亡久遠婆羅門仙一切冤結負于財命種種類族異類鬼神各及眷屬乘如來力於此時中決定降臨得受如來上妙法味清淨甘露飲食充足滋潤身田福德智慧發菩提心永離邪行皈敬三寶行大慈心利益有情求無上道不受輪回諸惡苦果常生善家離諸怖畏身常清淨證無上道口常清淨證無上道意常清淨證無上道伸五供養十方一切剎諸佛菩薩衆無量諸聖賢及諸業道官惟願大慈悲降臨於法會攝授花香燈塗果樂微分少供養師誦吽字而結手印六天母此乃表六度想成供養字湧出花香燈塗果樂天母一面四臂放光明上二手印持妙花香燈塗果樂下二手印輪相交吽唵啞吽唵啞吽𠶹哩妙花香燈塗果樂天母供養佛願佛慈悲哀納受因緣自性所出生所有種種微妙花香燈塗果樂奉獻上師三寶尊惟願慈悲哀納受戶唵薩哩嚩怛他誐多布思必度必啞嚕吉干的你微的捨不答布拶彌渴薩謨的囉斯囉納三麻耶啞吽師印呪可知應想心間字種出生六個吽字各具一色以六波羅密為體化成六天母窈窕美貌展左跪右而作舞勢奉供諸佛問六色何色答花淡紅色香黃色燈紅赤色塗白色果紅黃色樂青緑色各相其色故問如何以六度為體答此有所表花表布施布施令人能生歡喜故香表持戒持戒則業行芬馥故燈表忍辱忍辱則轉嗔恚火為大光明故塗表精進精進則潤澤法身故果表禪定禪定則能成就佛果故樂表智慧智慧則能出生種種諸法故問果有此天母耶謂只是依行想成答此六天母乃喜金剛中圍內有之皆佛母也皆文殊普賢之儔也如意輪蓮花心儀軌云于心月輪上想字形誦吽字已字化為六色光于此光中變為六菩薩各執供養物普供養諸佛前供上師三寶五供養與音樂呪分念此供化土三寶樂與五供養同申復與前異我以普賢行願力修設花香燈塗食微塵剎土諸聖賢一一遍禮皆供養次結運心供養印那麻薩哩斡二合答塔葛的毗牙二合月說穆契毗牙二合唵引薩哩斡二合哩塔烏忒葛二合的斯二合囉納兮慢葛葛捺龕莎訶蘇悉地羯羅供養法云兩手外相義合掌以右壓左置于頂上凡作供養應具此法至誠信心及奉閼伽皆以真言手印持誦成就及以運心合掌至頂方成圓滿供養之法又云次運心供養者以心運想水陸諸花無主所攝遍滿虛空盡十方界及與人天妙塗香雲燒香燈明幢幡傘蓋種種鼓樂歌舞伎唱真珠羅網懸諸寶鈴花縵白拂微妙磬鐸矜羯尼網如意寶樹衣服天厨諸食上妙樓閣嚴身瓔珞行者運心遍滿虛空以至誠心如是供養最為勝上大日經略攝念誦隨行法云次當隨力分供養表誠心閼伽香食燈乃至一花水或但心運想殊勝最難量有表無表俱一時皆成就金剛頂瑜伽念誦經第四卷云次明供養飲食法應以香潔種種微妙飲食供養如不能辦隨力作已復當心念世間所有上妙飲食及種種珍果蒲桃石榴等諸非時漿而作供養我以至誠心奉獻甘露食惟願三寶尊慈悲哀納受次結獻佛印一舊作遣魔印唵引斡資囉二合拽屹徹二合吽師印呪可知應想掌中有赤色字字腳放光從三尖出作搖扇勢遣食器上魔問食器上有何等魔答有尋香食施食等魔礙故今遣之也藏本云將奉三寶施食先結三尖印聖寶藏神儀軌經云獻佛印以右手大指捻小指甲餘三指如金剛杵相向上而轉作獻佛印我以佛神力依教誦密言加持甘露食變滿虗空界次結變空印二羽虛合掌如蓮花狀竪立胸前誦真言唵莎斡秫塔薩哩斡二合塔哩麻二合莎斡秫徒㰠唵引啞吽師印呪可知應想食器及食悉皆空寂以分斷食多染觸故故今空之極令清淨于其空處應想三個𠽾二合字字皆金色變成食器于食器中想白色唵字變成勝妙飲食皆醍醐乳酪及蜜等味默淨念唵啞吽二十一遍極令廣大已復念拶吽𠳐斛而作手印想令前來所觀三寶海會分明顯現再伸五供養施寶錯念思麻囉等呪想三寶攝受初一分奉佛并法衣一分奉菩薩聖僧後一分奉顯密護神等既奉獻已然後作掬水勢念云以此甘露食奉獻諸聖賢憐愍我等故慈悲哀納受次結奉食印唵引啞葛嚕穆看薩哩斡二合塔哩麻二合喃啞牒耶二合奴忒班答奴唵啞吽吒莎訶仰二手二掌向前側相著二無名指頭側相著微曲二頭指博著中指側二大指博著頭指側小似掬水相想諸佛子等遍奉受用生歡喜心求索顯事必蒙允許廣迎聖衆入壇即以香花燈塗等而為供養之奉食偈我今奉獻甘露食量等須彌無過上色香美味遍虗空上師三寶哀納受次供顯密護神等後及法界諸有情受用飽滿生歡悅屏除魔礙施安寧今辰施主眷屬等消灾集福壽延長所求如意悉成就一切時中願吉祥三寶讚世尊大慈妙莊嚴明解圓滿一切智能施福慧如大海于諸如來我讚禮自性本體離諸欲能依此行脫惡趣以為甚深玄妙理於諸妙法我讚禮解脫道中勝解脫持淨戒行堪恭敬勝妙福田生勝處于彼大衆我讚禮入禪定偈普陀洛伽常入定隨緣赴感靡不周尋聲救苦度羣迷故號名為觀自在次入觀音禪定以上供養三寶是作福門有福而無智則落于人天因果今若修習此觀音禪定則有智既具福智即同諸佛然後于法界衆生能作利益侍者白云次入觀音禪定師作禪定維那伸偈其聲貴柔和清亮不可雄厲恐妨觀想又不可太近世俗兒女之聲當入定時閉目澄心觀想自身中圓滿潔白猶如淨月于心淨月上想𠶹哩字放大光明其字變成八葉蓮花上有觀自在菩薩相好分明左手持蓮花右手作開敷勢作是思惟一切有情身中有此覺悟之花清淨法界不染煩惱蓮花八葉上各有如來入定跏趺而坐面向觀自在項佩圓光身如金色光明晃曜想此八葉蓮花漸舒漸大量等虗空以此覺花照觸如來海會願成廣大供養以此覺花蒙照觸者于諸苦惱悉得解脫等同菩薩相好即想蓮花漸收量等己身結印念呪加持四處以此加持令身堅固所謂頂喉心臍每于印處成𠶹哩二合字其字印以二手外相叉二頭指相拄如蓮花葉二大指並竪即誦觀自在菩薩真言觀音禪定偈南無無盡三寶尊我今誓發菩提心唯願菩薩來攝授速證觀音微妙身次入觀音三摩地澄心閉目觀心中圓滿皎潔淨月上字種放光成蓮花花中有一觀自在相好具足無比對左手執持妙蓮花右手於葉作開勢菩薩思惟有情身各具覺悟之蓮花清淨法界無惑染八葉各有一如來如來入定跏趺坐各各面向觀自在項佩圓光身金色光明朗照及晃耀次想其花漸舒大其量周遍虗空界思彼覺花照法界如來海會共廣大心若不移于此定憐愍一切諸衆生覺花蒙照脫苦惱便同菩薩觀自在蓮花漸收同己量復結自在觀音印加持四處誦密言自身亦等觀自在以此禪定勝功德回向法界諸衆生同見西方無量光成就普賢廣大願觀音禪定印唵引斡資囉二合塔囉麻二合𠶹哩二合次入躡前生後三摩地即是聞塵澄心則清淨之時也內不放出閉目則觀想之時也外緣不入問心無所在安得有中答此明肉團心也以靈知之心栖止于肉團之心內故師當于此作六禁反偈之略也其說應當于心尖上想一紅色𠳐字變成雜色八葉蓮花花上想白色阿字變成月輪也圓滿皎潔者心之體用也圓而滿則無德不備體也皎而潔則無所不照用也字種𠶹哩字也此字乃大悲菩薩取證之理度生之妙門也放究成蓮花者乃所造之花也即𠶹哩心增長自身成觀自在菩薩之種也逆順無礙故名自在花乃指所坐之花也偈之略也其說應云一面二臂其身金色花冠瓔珞嚴身頂戴阿彌陀佛無比對稱讚之詞也理能成事故云持也花表因果同時也事能顯理故能作開勢也已上並是自覺思惟有情方是覺他行菩薩行也偈意謂一切衆生與菩薩本是同體皆有覺悟之蓮花但由顛倒執著而不證也故菩薩思惟而起哀救行者于此處更不可將菩薩與自身作兩處想前來既以字種增長作觀音此處思惟即是指行者之言也如是禪定若不能念思惟則向所作法徒勞心力當與前兩句作一片看不可打成兩橛清淨法界一塵不立也無垢染清淨若執著清淨即成垢染矣八葉即指心間蓮花之八葉各有一如來者八識元是一心也既是一心還同正覺而為一體故云各有一如來者即是觀音也不言菩薩而言如來者一超直詣也此二句通自他說約他則言有情心本清淨無垢覺悟蓮花中有八如來約自則言行人與八如來同時入定也問定有多種如今來入定何等定耶答即行人所入之定也此定名為剎那大悲禪定又問各各面向前四面向可後四面豈不背耶答向背豈得名為如來正所謂妙在轉處矣若約事相而說諸佛菩薩身非同衆生分段之身東向則背西南向則背北而菩薩則不然有隨類意生身應化無窮背向皆正豈八如來也或千佛萬佛向無不正學者當作是觀更須向前來者無向背處看上句彰殊勝身下句彰殊勝境從前來七行偈十四句皆顯法界也今此二句方入理事無礙法界次想者令知時也以事攬理成故能漸舒大以理隨事變故能遍法界則其大無外也皆是惟心境界非分外的事也如來海會正明事事無礙也覺花事也海會亦事也以覺花稱周時與如來海會同時廣大而無礙譬如一室千燈光光無雜法界十法界也四聖六凡之謂也意謂此花舒大時能照此十法界同于一真更無殊別也上來思惟有情方是起行至此憐愍一切方是行行謂證此無礙廣大境界方能行行度生也深有密焉學者不可不慎也蒙照脫苦惱利生之效也觀自在所獲之果也初發心時即得阿耨多羅三藐三菩提之謂也前八句皆舒至漸收一句惟卷約密說即是增長究竟准魯餘巴現前解云從正位而起名增長復歸正位是究竟亦是始本不二也上師云有放不收同凡夫有收無放名聲聞有收有放名為祕密境界收放總不用名無戲論此乃最極本續也收之一字不覺如此輕易流布學者說不可作等閒見聞也加持四處此約行者請求智佛冥加之力也所以密言者皆指後面手印之密言也回光返照者前來既觀觀音今恐迷己逐物復回觀自身故云亦等問以何義最初既以字種增長令成觀音何又云亦等答初來增長由未離覺今是親證親入也如善財始見文殊等也又前所想觀音望因則名因中果也加持密言之後則當體即果中因也問初入壇場即頓起觀音慢今復何故又入此定豈不濫耶答不也前是根本定亦名正位亦名正體如在家為人也此後所入定即是所作定如人在邦為臣也其實一體而約處殊也又如人在朝則朝衣在戎則戎服故根本定白色所作定金色向下隨一一作法多有更易身色常以此理鑑之故勿疑諸結自在觀音印以二手外相叉二頭指相拄如蓮花葉二大指並竪即誦真言時四處頂喉心臍是也師印呪可知每處以手印按之誦真言一次復以唵字加持即當以印按口上次以吽字加頂𫬠字加臍𠶹哩字加心阿字加喉以此加持令身堅固也所以一切魔礙皆不能害加持四處有二說只用前說若人欲了知三世一切佛應觀法界性一切惟心造次結破地獄印兩羽金剛拳施慧兩相鉤進力竪相拄念想開地獄三誦三掣開真言曰那麻阿瑟吒二合瑟吒二合攝諦喃三藐三勃塔俱胝喃唵引撮引辣引納嚩婆細提哩提哩吽師印呪可知應想自身增長紅色觀音一面二臂舌上心間印上三處皆有紅色𠶹哩二合字放光如日初出之光照觸地獄悉皆破壞問一處放光足以破之何用三乎答為彼地獄是衆生三業妄造故故今亦用三業放光而破之也又問地獄是衆生別業而成云何能破答雖云別業同是一心以智照之衆生亦無豈有地獄由迷一心故妄造衆惡惡業成熟妄成地獄既墮地獄妄見受苦譬如夢中為虎狼獅子所噬或為賊所縛或遭王難受種種苦及至夢醒了無所得今觀地獄及苦亦復如是今假以照力無不破也問地獄既然本空何須破而救之答我雖以智照知其本空彼無智照焉得不苦故圓覺經云夢時非無及至于醒了無所得今正欲破此地獄及苦空也若惟原之彼以惡業因緣而成地獄則知非本有矣我今以智照因緣而為之破豈不破乎一禪定二手印三真言四作觀五智照有此五種因緣何事不辦豈惟破地獄乎今世學者濫稱闍黎惟是音聲振鈴擊節慮恐負于請主之意者多矣可不慎與此印呪出破阿毗地獄智炬陀羅尼經又準滅惡趣王本續說手結密印從印流出火光口誦神呪口出無量火光心月輪上紅色𠶹哩二合字放赤色火光三光同照阿毗地獄等三誦三掣關鎖自開所有罪人悉皆得出此舉難破偏言地獄若準下文理應光照通餘五趣意令專注故偏舉此別行經云此呪若誦一遍無間地獄碎如微塵于中受苦衆生悉生極樂世界金剛頂蓮花部心念誦儀軌云次結開門契二羽金剛拳檀慧相應鈎進力竪側合每誦真言時應吽而擘開千手千眼修行儀軌云此印亦名警覺一切如來印由結此警覺一切如來印故一切如來皆從定起加護攝受云云由此印呪威神力故所有諸趣地獄之門隨此印呪豁然自開儀軌經無神字奉請地藏菩薩表白三舉香花迎請阿闍黎執爐三請云南無一心奉請衆生度盡方證菩提地獄未空誓不成佛大聖地藏王菩薩摩訶薩惟願不違本誓憐愍有情此夜今時光臨法會衆和香花迎香花請一心召請花生大地華長名園花逢細雨滋開花被狂風擺落嗚呼人生如花綻之期人死似花殘之際良宵夜奉佛普利薦拔某是夜命我沙門設放瑜伽𦦨口平等甘露法食初爇名香初伸設召大地饑虛衆當齊亡故一位靈魂再伸召請各家本宅祠堂之內愛及法界之中大地山河之內四生六道八難三途有無二主孤魂佛子等衆惟願承三寶力仗祕密言此夜今時來受無遮甘露法食一心召請月明波底月朗長江月圓如鏡挂當空月缺似弓張遠漢嗚呼人生如月滿之期人死似月虧之際良宵夜一心召請巫山一段雲楚岫一團雪名園一株花瑤臺一輪月嗚呼剎那雲散雪銷鎔又是花殘并月缺良宵夜一心召請纍朝帝主歷代王侯九重殿闕高居萬里山河獨據西來戰艦千年王氣俄收北去鑾輿五國冤聲未斷嗚呼杜䳌呌落桃花月血染枝頭恨正長如是前王後伯之流一類孤魂等衆一心召請築壇拜將建節封侯力移金鼎千鈞身作長城萬里霜寒豹帳徒勤汗馬之勞風息狼烟空負攀龍之望嗚呼將軍戰馬今何在野草間花滿地愁如是英雄將帥之流一類孤魂等衆一心召請五陵才俊百郡賢良三年清節為官一片丹心報主南州北懸久離桑梓之鄉海角天涯遠喪蓬萊之島嗚呼官况蕭蕭隨逝水離魂杳杳隔陽關如是文臣宰輔之流一類孤魂等衆一心召請黌門才子白屋書生探花足步文林射䇿身遊𣗥院螢燈飛散三年徒用工夫鐵硯磨穿十載謾施辛苦嗚呼七尺紅羅書姓字一坯黃土蓋文章如是文人才子之流一類孤魂等衆一心召請出塵上士飛錫高僧精修五戒淨人梵行比丘尼衆黃花翠竹空談祕密真詮白牯黧奴徒演苦空妙偈嗚呼經窗冷浸三更月禪室虗明半夜燈如是緇衣釋子之流一類覺靈等衆一心召請黃冠野客羽服仙流桃源洞裏修真閬苑洲前養性三花九煉天曹未許標名四大無常地府難容轉限嗚呼琳觀霜寒丹竈冷醮壇風慘杏花稀如是玄門道士之流一類遐靈等衆一心召請江湖羈旅南北經商圖財萬里遊行積貨千金貿易風霜不測身膏魚腹之中途路難防命喪羊腸之險嗚呼滯魄北隨雲黯黯客魂東逐水悠悠如是他鄉客旅之流一類孤魂等衆一心召請戎衣戰士臨陳健兒紅旗影裏爭雄白刃叢中敵命鼓金初振霎時腹破腸穿勝敗才分遍地肢腸首碎嗚呼漠漠黃沙聞鬼哭茫茫白骨少人收如是陳已兵卒之流一類孤魂等衆一心召請懷耽十月坐草三朝初欣鸞鳳和鳴次望熊羆叶夢奉恭欲唱吉凶只在片時璋瓦未分母子皆歸長夜嗚呼花正開時遭急雨月當明處覆烏雲如是血湖産難之流一類孤魂等衆一心召請蠻夷戎狄瘖啞盲聾勤勞失命庸奴妬忌傷身婢妾輕欺三寶罪𠍴積若河沙忤逆雙親凶惡浮于宇宙嗚呼長夜漫漫何日曉幽關隱隱不知春如是冥頑悖逆之流一類孤魂等衆一心召請宮幃美女閨閣佳人胭脂畫面爭妍龍麝熏衣競俏雲收雨散魂消金谷之園月缺花殘腸斷馬嵬之驛嗚呼昔日風流都不見緑楊芳草髑髏寒如是裙叉婦女之流一類孤魂等衆一心召請饑寒丐者刑戮囚人遇水火以己身逢虎狼而失命懸梁服毒千年怨氣沉沉雷擊崕崩一點驚魂漾漾嗚呼暮雨青烟寒鵲噪秋風黃葉亂鴉飛如是傷已橫死之流一類孤魂等衆一心召請法界六道大地含靈面然所統薜荔多衆塵沙種類依草附木魑魅魍魎滯魄孤魂自他先亡家親眷屬等衆惟願承三寶力仗祕密言此