二合斡資哩二合薩怛薩怛薩囉諦薩囉諦得囉二合夷得囉二合夷微䭾麻尼二合三攀拶納禰得囉二合麻禰的席塔𠶹哩二合得蘭二合顏席提脫夷二合莎訶甘露軍茶利儀軌云二手內相義進力並伸直忍願纏進力初節前各以峯相拄禪智並伸直又云應結金剛輪菩薩印誦密語以入曼拏囉者受得三世無障礙三種菩薩律儀由入曼拏囉身心備十微塵剎世界微塵數三昧耶無作戒禁或因屈伸俯仰發言吐氣起心動念廢忘菩提之心退失善根以此印契密言殊勝方便誦持作意能除違犯愆咎三昧耶如故倍加光顯能淨身口意故則成入一切曼拏囉獲得灌頂三摩耶唐沙門慧日云有人未曾經和尚阿闍黎入大曼茶囉壇場者但寬取大輪明王金剛呪誦二十一遍即當入壇然後作諸呪法悉得成就又云誦密言時作是觀想盡虗空遍法界三界生死六趣有情速得入金剛界大曼拏囉等同金剛薩埵大菩薩師印呪可知應想面前空處離身七肘高八肘現一金色𠽾二合字種變成勝妙宮殿以大千國土合為一國土以此國土融成一宮殿一一莊嚴皆准華嚴經說勝妙樂事問此大千國土合而為一云何合耶答一切國土體自空寂誰立彊界若離衆生見則國土自一問此土衆生置于何處答自中衆生即諸佛心中之衆生同佛受用復何用置問何全依心想便成宮殿答彼大千國土等咸是妙明真心所現若離真心畢竟無有全依幻化力故復以大千國土而為宮殿是為萬法而由我者也歸命十方調御師演揚清淨微妙法三乘四果解脫僧願賜慈悲臨法會奉請三寶表白和香花迎香花請阿闍黎執罏三請南無一心奉請盡十方遍法界微塵剎土中諸佛法僧金剛密跡衛法神王天龍八部婆羅門仙一切聖衆惟願不違本誓憐愍有情此夜今時光臨法會此夜今時句儀軌經無斯三寶等屬變化土將欲下化故特奉請請畢阿闍黎合掌白云謹依瑜伽教建置曼拏囉惟願三寶尊慈悲哀納受印現壇儀千手眼修行儀云二手各作金剛拳施進慧力相鈎胸前微動誦真言曰唵斡資囉二合拶裓囉二合吽𠳐斛師印呪可知應想心間字種放光至色究竟天上召請智觀世音來入道場此智觀世音即放無量光召請一切三寶及顯密護神來至道場重重無盡問于此教門但說果主因伴今何得因為主果為伴耶答此有二義一行者以觀音為所緣熟境故先契此境後契諸佛之境然觀音放光召請諸佛亦猶行者召請觀音者也今藉觀音請佛非為主也二此菩薩即是過去威德自在光明王如來退位度生即果位也若或為主亦無過也建壇儀云若無壇佛應結才發意轉法輪印印現壇儀千手眼觀自在儀軌云二手各作金剛拳進力檀慧相鈎結又云即結才發意轉法輪菩薩印以印置于身前壇上即成蓮花部遍調伏大曼拏囉以印安于心上即自身成大曼拏囉以印觸本尊像等皆成大曼拏囉以印置身前空中即滿虗空界成大曼拏囉行者設有越法誤失三業破三昧耶戒由結此印誦真言加持故能除諸過皆得圓滿然後恭申情旨羅列香花建寶壇重重佛境一毫端心融妙理虗空小道契真如法界寬相好慈悲秋月滿化身騰處暮雲繁香烟堆裡瞻應現萬象森羅海印含釋迦如來證明功德彌陀如來慈悲攝授觀世音菩薩密垂加護阿難陀尊者興權啓教香雲蓋至此宣疏畢或執手罏表白擊引磬念三十五佛聲宜和緩或用鐘鼓同衆念大懺悔懺悔師
