body:
  text: 苕水法師子若淨觀考正稱山法師內衡智銓較閲秀州後學巨徹寂暹纂書大寶華王座人天普護持我今登演處觸目即菩提吉祥會啓甘露門開孤魂佛子降臨來聞法赴香齊逈脫輪回幽暗一時開雲來集此香不從天降豈屬地生兩儀未判之先根源充塞三界一氣才分之後枝葉遍滿十方超日月之光華奪山川之秀麗即戒即定即慧非木非火非烟收來在一微塵散處普熏法界爇向罏中專伸供養常住三寶剎海萬靈歷代祖師一切聖衆河沙品類幽顯聖凡悉仗真香普同供養香雲蓋佛面猶如淨滿月亦如千日放光明圓光普照于十方喜捨慈悲皆具足南無盡虗空遍法界過現未來佛法僧三寶登寶座伏以登瑜伽顯密之座六度齊修開濟物利生之門三檀等施一心湛寂全身總是大悲王三業應兮脫體俱成𠶹哩字果然如是則是因是果不出自心自利利他豈關餘物化滴水作長河之酥酪變微食為大地之斛食于倏忽際普濟法界之饑虗在頃刻間利益河沙之鬼趣若也如斯會得須當普利羣機其或未然不免重宣妙偈所謂道塵塵剎盡圓融萬別千差一貫通拈起珊瑚枝上月光輝炯炯照無窮南無大悲觀世音菩薩衆和畢上師祝水文夫此水者八功德水自天真先洗衆生業垢塵遍入毗盧華藏界箇中無處不超淪水不洗水妙極法身塵不染塵返作自己蠲除器界蕩滌壇場灑枯木而再逢春潔穢而成淨土所謂道內外中間無濁穢聖凡幽顯總清凉教有密言今當持誦大衆同聲誦大悲神呪畢表白舉甘露王三遍侍者白云何梵云何于此經究竟到彼岸願佛開微密廣為衆生說淨法界真言誦真言時調伏身心想頂臍兩處具唵㘕二字令清淨故以表福智圓滿唵囕莎訶成就妙法蓮華經王瑜伽觀智儀軌云應結法界生印二手各作金剛拳舒二頭指側相拄即成安印於頂于其印中想法界種子𫬠字其色皓白遍流光明普照一切有情界能破一切有情虗妄煩惱當觀自身及諸有情同一法界無二無別大毗盧遮那成佛神變加持經第二卷中法界真言曰㘕瑜伽蓮花部念誦法云當觀頂上有法界生字放赤色光所謂㘕字顯密圓通云此梵書㘕字若想若誦能令三業悉皆清淨一切罪障盡得消除又能成辦一切勝事隨所住處悉得清淨衣服不淨便成淨衣身不澡浴便當澡浴若用水作淨不名真淨用此法界心㘕字淨之即名畢竟清淨譬如靈丹一粒點鐵成金真言一字變染成淨又大毗盧遮那成佛神變加持經第四卷中有淨法界真言曰南無三曼多勃馱南達麼䭾睹薩嚩婆嚩句痕大悲空智儀軌經云佛說一切真言句首當安唵字次安吽癹吒字後用莎賀字若真言初以唵字後加莎訶字寂災用初以唵字後加𤙖癹字攝召用初後納麼增益用初後𤙖癹降伏用點淨真言誦真言時用右手無名指搵取香水彈灑虗空并塗掌想壇場內外悉令清淨唵啞穆葛拶囉彌麻迎蘇嚕蘇嚕莎訶此真言名出不空罥索經用右手無名指搵取白檀香水塗二手掌甘露軍茶利儀軌云修瑜伽者不應執著外淨當以勝義自性清淨法水洗滌身心如理相應守護國界主陀羅尼經云金剛結跏端身正坐左手仰掌當于臍上右手仰掌重左手上以大拇指令頭相拄此印名為第一最勝三昧之印能滅狂亂一切妄念令心一境澄定身心方入法界三昧加持花米真言誦真言時以手拈花米三次想成光明種出生金銀碧玉珍寶之雲唵斡資囉二合𠽾彌啞吽持明藏儀軌經云用稻穀花遍散其上虗空藏菩薩問七佛陀羅尼經云以三指撮米花而呪之此即花米之因也將欲應用表顯諸法故加持之加持鈴杵真言誦真言時手拈花米灑在鈴杵上想成智慧種唵斡資囉二合薩答啞吽唵斡資囉二合看吒啞吽金剛頂蓮花部心儀軌云次結振鈴印右杵左振鈴心入聲解脫觀照般若理仁王護國般若波羅蜜多經道場念誦儀軌云東方金剛手菩薩手執金剛杵表起正智猶如金剛能斷我法微細障故北方金剛藥義菩薩手持金剛鈴鈴音振擊覺悟有情以表般若警羣迷故諸部要目引經云不持金剛杵無由得成就金剛杵者菩提心義能壞斷二邊契中道唵一引啞二引吽三引大教王經云唵字是大遍照如來阿字是無量壽如來吽字是阿閦如來佛說大悲空智大教王儀軌云唵啞吽三字名加持真言成佛儀軌云由誦此唵字加持威力故縱觀想不成于諸佛海會諸供養雲海真實真成就由諸佛誠諦法爾所成故由適誦阿字摧滅諸罪障獲諸悅意樂等同一切佛超勝諸魔羅不能為障礙應受諸世間廣大之供養由吽字加持虎狼諸毒蟲惡心人非人盡無能陵屈如來初成佛于菩提樹下以此印密言摧壞天魔衆分一二三并引字準密呪圓因集降魔偈持杵振鈴誦我今振鈴杵聲遍十方處禮請諸聖賢悉皆來赴會此乃一切諸如來手中執持金剛杵金剛佛母大勇識我亦恆常而執持願滅有情大愚癡唵賀囉賀囉吽三遍左手執持微妙七寶鐸洪音振動十方及三際梵音嘹喨驚覺魔冤心摧碎邪妖魍魎諸鬼魅右手執持金剛降魔杵威勢力重八萬四千斤摧壞天與非天魔眷屬普使回光返照而渴仰內外冤魔三毒四害等呪咀魘禱波旬及外道三尖火輪遣魔變空力能使顛倒夢想皆遠離四方八面忿怒諸天魔聞我作法諦聽而信受唧𫩔叭怛祕密妙伽陀彈指掃蕩惡及禍祟十二因緣呪唵耶答兒麻二合兮都不囉二合巴斡兮敦的山答塔葛答歇斡怛的山拶約尼嚕怛耶𠳐叭諦麻曷釋囉二合麻納耶莎訶密呪圓因往生集中準經翻譯即為頌曰諸法從緣起如來說是因彼法因緣盡是大沙門說此呪兩用今始開壇是緣起義加持灌頂真言唵斡資囉二合毗盧拶耶吽稽首皈依蘇悉帝頭面頂禮七俱胝我今稱讚大準提惟願慈悲垂加護南無薩哆喃三藐三菩陀俱胝喃怛姪他唵折主準提莎訶我及法界一切有情從今為始乃至未證菩提之間誓願皈依金剛上師三寶上師三寶真言手持花米上舉而誦捺謨孤嚕二合毗耶二合捺謨勃塔耶捺謨達而麻耶捺謨桑渴耶唵哩哩哈哈吽吽怛唵失哩麻哈歌羅哈哈吽吽怛莎訶唵一引啞二引吽三引將手持的花米散灑虗空想所落寶米悉成花香諸供養等雲準瑜伽大教王經上師即金剛阿闍黎經云此阿闍黎即是我等諸佛父母及為我等諸佛之師云云此金剛阿闍黎即金剛手祕密主亦即毗盧遮那故為釋迦等師毗盧遮那及四如來即佛寶金剛一乘甚深教即法寶金剛菩薩等即僧寶此上師三寶屬受用土報身佛等非變化土釋迦佛等即中圍佛會也總持教中說三十七尊皆是毗盧一佛所現謂毗盧遮那如來內心證自受用成于五智從四智流出四如來大圓鏡智流出東方阿閦如來平等性智流出南方寶生如來妙觀察智流出西方無量壽如來成所作智流出北方不空成就如來法界清淨智即自當毗盧遮那如來言三十七者五方如來各有四大菩薩在于左右中央毗盧遮那如來四菩薩者一金剛波羅蜜菩薩二寶波羅蜜菩薩三法波羅蜜菩薩四羯磨波羅蜜菩薩東方阿閦如來四菩薩者一金剛薩埵菩薩二金剛王菩薩三金剛愛菩薩四金剛善哉菩薩南方寶生如來四菩薩者一金剛寶二金剛威光三金剛幢四金剛笑西方無量壽如來四菩薩者一金剛法二金剛劍三金剛因四金剛利北方不空成就如來四菩薩者一金剛業二金剛法三金剛藥義四金剛拳已有二十五及四攝八供養故成三十七言四攝者即鈎索鎖鈴八供養者即燒散燈塗花縵歌舞皆上有金剛下有菩薩然此三十七尊各有種子皆是本師智用流出自性偈方便自性不壞體金剛不壞大勇識最勝無比超出相今此所作皆成就勝慧自性甚深性演說最上法輪音以無生現方便身今此所作願得成淨印法門經云佛言以我自性即菩提場自性而菩提場自性即一切衆生自性彼一切衆生自性即一切法自性大智度論云如金剛山從上穿下至金剛際自性便止一切金剛皆金剛輪而為自性又金剛座亦從金剛際自性而起佛說大悲空智儀軌經云佛告金剛藏菩薩空智者謂大悲空智金剛者體即勝惠以勝惠方便成就儀軌乃至生住因緣以識智成辦又云以智慧方便自性出生諸法又云金剛渴椿誐杖者表智慧相奎樓鼓者即善方便淨地偈一切方隅所有地瓦礫砂磧等皆無琉璃寶地平如掌柔軟微妙願安住猶如極樂國莊嚴妙寶為地衆花敷園林池沼無缺少以大法音願具足從出世間復能現種種七寶之所成無量光明遍照處諸佛菩薩願安住此中雖屬手印壇然作法一準畫像曼拏囉故須念淨地偈尋諸部建壇儀則如此渴義音樂呪唵斡資囉二合看支夷囉納二合囉納二合不囉二合囉納不囉二合囉納三不囉二合囉納三不囉二合囉納薩哩斡二合勃塔赤的囉二合不囉拶哩答麻曷不囉二合尼牙二合巴囉蔑答那達速巴微薩哩斡二合塔哩麻二合𠶹哩二合達耶傘多沙納葛哩吽吽吒莎訶此呪三用今初皈依三寶將欲啓壇而念故缺和和啞龕緣起文切以法不孤起仗境方生道不虗行遇緣即應今則羅列華壇闡揚佛事香焚寶篆騰五色之雲霞燭綻金蓮燦一天之星斗法樂奏無生之曲梵音演最上之宗歸依五眼六通迎請千賢萬聖由是覺王住世以法利生不有因緣無由垂範是以阿難尊者林間習定夜是鬼王口吐火𦦨頂髮烟生身形醜惡肢節如破車之聲譏火交然烟喉似針鋒之細見斯怪異問是何名答曰面然汝三日之中當墮我類阿難驚怖歸投大覺慈尊敘說前因啓請救苦之法佛垂方便利濟洪深使延年而益算誦威德之真詮令餓鬼以充資施甘露之法食加持必專于神呪嚴衛須假於壇儀雖然啓請一時法傳千古金山修建不燭自明摩伽斛食施周法界若無靈驗今古焉傳有是功勳方堪演說梵音演處上窮有頂之天唐韻宣時下極風輪之際欲明聖理故白斯文佛事完成同歸真際所謂道最勝光明自在王如來宣演妙難量昔因慶喜生惶怖𦦨口雷音報禍殃稽首殷勤白教主興慈濟物利生方如今稽古重拈出凡聖同遊解脫場唵斡資囉二合麻明啞吽用右手無名指點取香水彈灑曼丹此曼丹作法成後即名曼拏囉灑水誦呪亦加持義唵斡資囉二合烏怛葛啞吽仍用右手無名指點取香水于曼丹上右旋作一圓相佛說大教王經明畫像壇儀云時阿閻黎于曼拏囉地中間以塗香作圓相𭦟拏囉今手印壇亦準經義故以香水于曼丹上作此圓相表曼拏囉也佛說祕密相經云當念誦時應觀心月曼拏囉相則知作此圓相有二義一則以事顯法二乃觀想唯心曼拏囉也般若波羅密多理趣釋云以事顯于理故即事即理理事不相礙故就念真言一遍作圓相一匝次加持花米成光明種如用之時悉成如意珍寶供具唵斡資囉二合𠽾彌啞吽念真言時手持花米右旋灑散曼丹如空注雨輪圍山鐵圍山唵斡資囉二合哩契啞吽佛說金剛手菩薩降伏一切部多大教王經云告大部多主無能勝言所有四大洲界閻浮提內一切衆生作法誦持悉令成就今此亦用四洲為限是故加持唱此二山為地界金剛地勝金剛地基吽字而作擁護佛說大教王經云復想曼拏囉地即成金剛地遍滿熾盛時阿闍黎即稱己名同誦吽字大樂金剛不空理趣釋下卷云字者是因義即一切如來菩提心亦是一切如來不共真如妙體恆沙功德皆從此生誦一真言拈一花米排列須彌等位如圖南北東西四部洲百千剎土亦能酬須彌頂上安宮殿大地孤魂脫苦丘唵唅彌囉微捺麻大須彌山唵唅斯克徹二合麻彌囉微捺麻小須彌山唵巖晡兒斡二合微的葛耶捺麻東勝神洲唵巖的葛耶捺麻小勝神洲唵巖微的葛